name: SecureBank CI + SonarCloud

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: "0 6 * * *"

jobs:
  backend-checks:
    name: Backend Security & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: |
          npm ci --ignore-scripts || npm install --no-audit --no-fund

      - name: Dependency audit (SCA)
        run: npm audit --omit=dev || true

      - name: Lint check
        run: npm run lint --if-present || echo 'No lint script'

      - name: Unit tests
        run: npm test --if-present

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: backend/jest-report.xml
          retention-days: 14

      - name: SonarCloud Backend Scan
        uses: SonarSource/sonarcloud-github-action@v2
        if: always()
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          organization: ${{ secrets.SONAR_ORG }}
          projectKey: bank_project_backend
          projectBaseDir: backend

  frontend-checks:
    name: Frontend Build & Static Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          npm ci --ignore-scripts || npm install --no-audit --no-fund

      - name: Dependency audit (SCA)
        run: npm audit --omit=dev || true

      - name: Build check
        run: npm run build --if-present
        continue-on-error: true

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build
          retention-days: 14
